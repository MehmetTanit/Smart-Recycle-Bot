apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot
spec:
  replicas: 1
  selector:
    matchLabels: { app: chatbot }
  template:
    metadata:
      labels: { app: chatbot }
    spec:
      containers:
      - name: chatbot
        image: 5aufgabe-chatbot:latest
        imagePullPolicy: Never
        envFrom:
        - configMapRef:
            name: configmap-chatbot
        - secretRef:
            name: secret-openai
        command: ["bash","-lc","python chatbot.py"]
        stdin: true
        tty: true
